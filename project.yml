name: OrthodoxCalendar
options:
  bundleIdPrefix: com.orthodox.calendar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  OrthodoxCalendar:
    type: application
    platform: iOS
    sources:
      - path: OrthodoxCalendar
    resources:
      - path: OrthodoxCalendar/Localization/sr.json
      - path: OrthodoxCalendar/Localization/ru.json
      - path: OrthodoxCalendar/Localization/en.json
      - path: OrthodoxCalendar/Localization/calendar_sr_2024.json
      - path: OrthodoxCalendar/Localization/calendar_ru_2024.json
      - path: OrthodoxCalendar/Localization/calendar_en_2024.json
      - path: OrthodoxCalendar/Localization/calendar_sr_2025.json
      - path: OrthodoxCalendar/Localization/calendar_ru_2025.json
      - path: OrthodoxCalendar/Localization/calendar_en_2025.json
      - path: OrthodoxCalendar/Localization/calendar_sr_2026.json
      - path: OrthodoxCalendar/Localization/calendar_ru_2026.json
      - path: OrthodoxCalendar/Localization/calendar_en_2026.json
      - path: OrthodoxCalendar/Localization/calendar_sr_2027.json
      - path: OrthodoxCalendar/Localization/calendar_ru_2027.json
      - path: OrthodoxCalendar/Localization/calendar_en_2027.json
      - path: OrthodoxCalendar/Localization/calendar_sr_2028.json
      - path: OrthodoxCalendar/Localization/calendar_ru_2028.json
      - path: OrthodoxCalendar/Localization/calendar_en_2028.json
      - path: OrthodoxCalendar/Localization/calendar_sr_2029.json
      - path: OrthodoxCalendar/Localization/calendar_ru_2029.json
      - path: OrthodoxCalendar/Localization/calendar_en_2029.json
      - path: OrthodoxCalendar/Localization/calendar_sr_2030.json
      - path: OrthodoxCalendar/Localization/calendar_ru_2030.json
      - path: OrthodoxCalendar/Localization/calendar_en_2030.json
      - path: OrthodoxCalendar/Localization/splash_logo.png
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.orthodox.calendar
        PRODUCT_NAME: "Orthodox Calendar"
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Add feast days and reminders to your calendar"
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Add feast days and reminders to your calendar"
