name: OrthodoxCalendar
options:
  bundleIdPrefix: com.orthodox.calendar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  OrthodoxCalendar:
    type: application
    platform: iOS
    sources:
      - path: OrthodoxCalendar
        excludes:
          - Resources/Assets.xcassets
    resources:
      - path: OrthodoxCalendar/Resources/Assets.xcassets
      - path: OrthodoxCalendar/Localization/sr.json
      - path: OrthodoxCalendar/Localization/en.json
      - path: OrthodoxCalendar/Localization/ru.json
      - path: OrthodoxCalendar/Localization/sr_saints_map.json
      - path: OrthodoxCalendar/Localization/ru_saints_map.json
      - path: data/output/calendar_sr_2026.json
      - path: data/output/calendar_ru_2026.json
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.orthodox.calendar
        PRODUCT_NAME: "Orthodox Calendar"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Add feast days and reminders to your calendar"
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Add feast days and reminders to your calendar"
